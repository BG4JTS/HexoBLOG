<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

<pre><code>    body {
        min-height: 100vh;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: &#39;Segoe UI&#39;, Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        position: relative;
    }

    /* 动态网格背景 */
    .grid-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: 
            linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
    }

    /* 浮动粒子 */
    .particles {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    .particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #fff;
        border-radius: 50%;
        opacity: 0;
        animation: float 15s infinite;
    }

    @keyframes float {
        0% {
            opacity: 0;
            transform: translateY(100vh) scale(0);
        }
        10% {
            opacity: 1;
        }
        90% {
            opacity: 1;
        }
        100% {
            opacity: 0;
            transform: translateY(-100vh) scale(1);
        }
    }

    /* 主容器 */
    .container {
        position: relative;
        z-index: 10;
        text-align: center;
        padding: 40px;
    }

    /* 404 数字 */
    .error-code {
        font-size: 180px;
        font-weight: 900;
        color: #fff;
        line-height: 1;
        position: relative;
        display: inline-block;
        letter-spacing: -10px;
    }

    .error-code span {
        display: inline-block;
        animation: glitch 2s infinite;
    }

    .error-code span:nth-child(1) { animation-delay: 0s; }
    .error-code span:nth-child(2) { animation-delay: 0.2s; }
    .error-code span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes glitch {
        0%, 90%, 100% {
            transform: translate(0);
            text-shadow: none;
        }
        92% {
            transform: translate(-2px, 2px);
            text-shadow: 2px -2px #fff, -2px 2px #fff;
        }
        94% {
            transform: translate(2px, -2px);
            text-shadow: -2px 2px #fff, 2px -2px #fff;
        }
        96% {
            transform: translate(-1px, 1px);
        }
    }

    /* 故障效果层 */
    .glitch-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 180px;
        font-weight: 900;
        color: #fff;
        letter-spacing: -10px;
        opacity: 0.8;
    }

    .glitch-layer::before,
    .glitch-layer::after {
        content: &#39;404&#39;;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }

    .glitch-layer::before {
        animation: glitch-1 0.3s infinite linear alternate-reverse;
        clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        color: rgba(255,255,255,0.8);
    }

    .glitch-layer::after {
        animation: glitch-2 0.3s infinite linear alternate-reverse;
        clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        color: rgba(255,255,255,0.8);
    }

    @keyframes glitch-1 {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
    }

    @keyframes glitch-2 {
        0% { transform: translate(0); }
        20% { transform: translate(2px, -2px); }
        40% { transform: translate(2px, 2px); }
        60% { transform: translate(-2px, -2px); }
        80% { transform: translate(-2px, 2px); }
        100% { transform: translate(0); }
    }

    /* 错误信息 */
    .error-message {
        margin-top: 20px;
        font-size: 24px;
        color: rgba(255,255,255,0.8);
        letter-spacing: 8px;
        text-transform: uppercase;
        animation: fadeInUp 1s ease-out 0.5s both;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* 描述文字 */
    .description {
        margin-top: 20px;
        font-size: 16px;
        color: rgba(255,255,255,0.5);
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.6;
        animation: fadeInUp 1s ease-out 0.7s both;
    }

    /* 返回按钮 */
    .home-btn {
        display: inline-block;
        margin-top: 40px;
        padding: 15px 40px;
        border: 1px solid rgba(255,255,255,0.3);
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        animation: fadeInUp 1s ease-out 0.9s both;
    }

    .home-btn::before {
        content: &#39;&#39;;
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #fff;
        transition: left 0.3s ease;
        z-index: -1;
    }

    .home-btn:hover {
        color: #000;
        border-color: #fff;
    }

    .home-btn:hover::before {
        left: 0;
    }

    /* 扫描线效果 */
    .scanline {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            to bottom,
            transparent 50%,
            rgba(255,255,255,0.02) 50%
        );
        background-size: 100% 4px;
        pointer-events: none;
        z-index: 100;
    }

    /* 响应式 */
    @media (max-width: 768px) {
        .error-code,
        .glitch-layer {
            font-size: 100px;
            letter-spacing: -5px;
        }
        
        .error-message {
            font-size: 18px;
            letter-spacing: 4px;
        }
        
        .description {
            font-size: 14px;
            padding: 0 20px;
        }
    }
&lt;/style&gt;
</code></pre>
</head>
<body>
    <div class="grid-background"></div>
    
<pre><code>&lt;div class=&quot;particles&quot; id=&quot;particles&quot;&gt;&lt;/div&gt;

&lt;div class=&quot;scanline&quot;&gt;&lt;/div&gt;

&lt;div class=&quot;container&quot;&gt;
    &lt;div class=&quot;error-code&quot;&gt;
        &lt;span&gt;4&lt;/span&gt;&lt;span&gt;0&lt;/span&gt;&lt;span&gt;4&lt;/span&gt;
    &lt;/div&gt;
    
    &lt;h1 class=&quot;error-message&quot;&gt;Page Not Found&lt;/h1&gt;
    
    &lt;p class=&quot;description&quot;&gt;
        您访问的页面似乎已迷失在数字虚空中。&lt;br&gt;
        让我们带您回到正确的方向。
    &lt;/p&gt;
    
    &lt;a href=&quot;/&quot; class=&quot;home-btn&quot;&gt;返回首页&lt;/a&gt;
&lt;/div&gt;

&lt;script&gt;
    // 生成浮动粒子
    function createParticles() {
        const container = document.getElementById(&#39;particles&#39;);
        const particleCount = 50;
        
        for (let i = 0; i &lt; particleCount; i++) {
            const particle = document.createElement(&#39;div&#39;);
            particle.className = &#39;particle&#39;;
            particle.style.left = Math.random() * 100 + &#39;%&#39;;
            particle.style.animationDelay = Math.random() * 15 + &#39;s&#39;;
            particle.style.animationDuration = (10 + Math.random() * 10) + &#39;s&#39;;
            container.appendChild(particle);
        }
    }
    
    createParticles();
    
    // 鼠标移动视差效果
    document.addEventListener(&#39;mousemove&#39;, (e) =&gt; {
        const x = (window.innerWidth / 2 - e.pageX) / 50;
        const y = (window.innerHeight / 2 - e.pageY) / 50;
        
        const errorCode = document.querySelector(&#39;.error-code&#39;);
        errorCode.style.transform = `translate(${x}px, ${y}px)`;
    });
&lt;/script&gt;
</code></pre>
</body>
</html>
